description: >-
  FinOps view of LinearB spend. LinearB bills as a per-contributor SaaS
  subscription across Free, Essentials, and Enterprise tiers, billed monthly or
  annually in USD. Cost scales with the number of active contributors rather
  than with API call volume; the public REST API is included with a subscription
  and is not separately metered.
notes: >-
  Per-contributor rates and tier minimums are subject to change and are largely
  quote-based; verify against the LinearB pricing page during reconciliation.
