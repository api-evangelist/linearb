meters:
- name: contributors
  description: Active contributors counted for per-contributor subscription billing.
  unit: contributors
  aggregation: max
  dimensions:
  - account
  - plan
- name: subscription_term
  description: Monthly or annual subscription term billed per plan tier.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track active contributor counts against the subscribed tier; reconcile against invoices.
- name: Allocation
  description: Map contributors to teams and services in LinearB to allocate subscription cost to the right cost centers.
- name: Optimization
  description: Right-size the tier to active-contributor count; consolidate inactive seats; choose annual billing where it lowers the effective per-contributor rate.
- name: Accountability
  description: Assign an owner for the LinearB subscription and review contributor counts and tier fit each renewal cycle.
