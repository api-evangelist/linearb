aid: linearb
url: https://raw.githubusercontent.com/api-evangelist/linearb/refs/heads/main/apis.yml
name: LinearB
kind: company
description: LinearB is a software engineering intelligence (SEI) and developer productivity
  platform that correlates Git, CI/CD, project management, and incident data into DORA
  and engineering metrics. The LinearB REST API lets teams report deployments, push
  incidents, export measurements, and manage teams and services programmatically.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Engineering Analytics
- SEI
- Developer Productivity
- DORA Metrics
- DevOps
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
